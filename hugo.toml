baseURL = 'https://wohlstandsillusion.de/'
locale = 'de'
defaultContentLanguage = 'de'
title = 'wohlstandsillusion.de'

[params]
  description = 'Fakten zur Vermögensverteilung in Deutschland und ihren Folgen für Sozialstaat, Renten, Pflege und Steuergerechtigkeit.'

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      typographer = true
    [markup.goldmark.renderer]
      unsafe = false

[sitemap]
  changefreq = 'monthly'
  filename = 'sitemap.xml'

[taxonomies]

[privacy]
  [privacy.disqus]
    disable = true
  [privacy.googleAnalytics]
    disable = true
  [privacy.instagram]
    disable = true
  [privacy.x]
    disable = true
  [privacy.vimeo]
    disable = true
  [privacy.youtube]
    disable = true

[[menus.main]]
  name = 'Startseite'
  url = '/'
  weight = 1

[[menus.main]]
  name = 'Über'
  url = '/ueber/'
  weight = 2

[[menus.footer]]
  name = 'Über'
  url = '/ueber/'
  weight = 1

[[menus.footer]]
  name = 'Impressum'
  url = '/impressum/'
  weight = 2

[[menus.footer]]
  name = 'Datenschutz'
  url = '/datenschutz/'
  weight = 3

[[menus.footer]]
  name = 'Kontakt'
  url = '/kontakt/'
  weight = 4
