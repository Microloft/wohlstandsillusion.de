baseURL = 'https://wohlstandsillusion.de/'
locale = 'de'
defaultContentLanguage = 'de'
title = 'wohlstandsillusion.de'

# Datums-Lokalisierung (für ".Date.Format")
[languages.de]
  languageName = 'Deutsch'
  weight = 1

[params]
  tagline = 'Daten zur Vermögensverteilung in Deutschland'
  description = 'Sachliche Daten und Hintergründe zur Vermögensverteilung in Deutschland. Quellen: Bundesbank, DIW, EZB, Statistisches Bundesamt. Themen: Vermögen, Renten, Pflege, Erbschaft, Steuern, Reallöhne.'
  ogImage = '/images/og-image.png'

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      typographer = true
    [markup.goldmark.renderer]
      unsafe = false

[sitemap]
  changefreq = 'monthly'
  filename = 'sitemap.xml'

[taxonomies]

[privacy]
  [privacy.disqus]
    disable = true
  [privacy.googleAnalytics]
    disable = true
  [privacy.instagram]
    disable = true
  [privacy.x]
    disable = true
  [privacy.vimeo]
    disable = true
  [privacy.youtube]
    disable = true

[[menus.main]]
  name = 'Startseite'
  url = '/'
  weight = 1

[[menus.main]]
  name = 'Artikel'
  url = '/artikel/'
  weight = 2

[[menus.main]]
  name = 'Über'
  url = '/ueber/'
  weight = 3

[[menus.footer]]
  name = 'Über'
  url = '/ueber/'
  weight = 1

[[menus.footer]]
  name = 'Impressum'
  url = '/impressum/'
  weight = 2

[[menus.footer]]
  name = 'Datenschutz'
  url = '/datenschutz/'
  weight = 3

[[menus.footer]]
  name = 'Kontakt'
  url = '/kontakt/'
  weight = 4
