{{ define "main" }}
<article class="container">
  <header class="page-header">
    <p class="article-back"><a href="{{ "/artikel/" | relURL }}">&larr; Alle Artikel</a></p>
    <h1>{{ .Title }}</h1>
    <p class="article-meta">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2. January 2006" }}</time>
      {{ with .Params.tags }}
      <span class="article-tags">
        {{ range $i, $t := . }}{{ if $i }}, {{ end }}<span class="tag">{{ . }}</span>{{ end }}
      </span>
      {{ end }}
    </p>
  </header>

  <div class="prose">
    {{ .Content }}
  </div>

  <footer class="article-footer">
    <p><a href="{{ "/artikel/" | relURL }}">&larr; Zurück zur Übersicht</a></p>
  </footer>
</article>
{{ end }}
