# wohlstandsillusion.de - Apache Virtual Host Configuration
# =========================================================
#
# Voraussetzungen:
#   sudo a2enmod ssl rewrite headers expires deflate
#
# Installation:
#   sudo cp apache-vhost.conf /etc/apache2/sites-available/wohlstandsillusion.de.conf
#   sudo a2ensite wohlstandsillusion.de.conf
#   sudo apachectl configtest
#   sudo systemctl reload apache2
#
# TLS-Zertifikat (nach DNS-Umstellung):
#   sudo certbot --apache -d wohlstandsillusion.de -d www.wohlstandsillusion.de

# --- HTTP: Redirect auf HTTPS ---
<VirtualHost *:80>
    ServerName wohlstandsillusion.de
    ServerAlias www.wohlstandsillusion.de

    RewriteEngine On
    RewriteRule ^(.*)$ https://wohlstandsillusion.de$1 [R=301,L]
</VirtualHost>

# --- HTTPS: www -> non-www Redirect ---
<VirtualHost *:443>
    ServerName www.wohlstandsillusion.de

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/wohlstandsillusion.de/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/wohlstandsillusion.de/privkey.pem

    RewriteEngine On
    RewriteRule ^(.*)$ https://wohlstandsillusion.de$1 [R=301,L]
</VirtualHost>

# --- HTTPS: Hauptseite ---
<VirtualHost *:443>
    ServerName wohlstandsillusion.de
    DocumentRoot /var/www/wohlstandsillusion.de/current

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/wohlstandsillusion.de/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/wohlstandsillusion.de/privkey.pem

    <Directory /var/www/wohlstandsillusion.de/current>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Security Headers
    Header always set Strict-Transport-Security "max-age=86400" env=HTTPS
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"
    Header always set Content-Security-Policy "default-src 'self'; style-src 'self'; font-src 'self'; img-src 'self'; script-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

    # Komprimierung
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/css text/xml application/xml application/rss+xml image/svg+xml
    </IfModule>

    # Cache-Header
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType text/html "access plus 1 hour"
        ExpiresByType text/css "access plus 1 year"
        ExpiresByType font/woff2 "access plus 1 year"
        ExpiresByType image/svg+xml "access plus 1 year"
        ExpiresByType image/webp "access plus 1 year"
        ExpiresByType image/avif "access plus 1 year"
        ExpiresByType image/png "access plus 1 year"
        ExpiresByType image/jpeg "access plus 1 year"
        ExpiresByType application/xml "access plus 1 hour"
        ExpiresByType application/rss+xml "access plus 1 hour"
    </IfModule>

    # Custom 404
    ErrorDocument 404 /404.html

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/wohlstandsillusion.de-error.log
    CustomLog ${APACHE_LOG_DIR}/wohlstandsillusion.de-access.log combined
</VirtualHost>
