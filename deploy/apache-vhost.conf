# wohlstandsillusion.de - Apache Virtual Host (HTTP-only)
# =========================================================
#
# Diese Datei enthält nur den Port-80-Vhost. Die HTTPS-Variante
# (wohlstandsillusion.de-le-ssl.conf) wird von certbot --apache
# automatisch erzeugt.
#
# Installation:
#   sudo cp apache-vhost.conf /etc/apache2/sites-available/wohlstandsillusion.de.conf
#   sudo apache2ctl configtest
#   sudo a2ensite wohlstandsillusion.de.conf
#   sudo systemctl reload apache2
#
# Anschließend (nach DNS-Umstellung):
#   sudo certbot --apache -d wohlstandsillusion.de -d www.wohlstandsillusion.de
#
# Nach dem certbot-Lauf: Inhalt aus security-headers.conf in die
# automatisch erzeugte wohlstandsillusion.de-le-ssl.conf einfügen.

<VirtualHost *:80>
    ServerName wohlstandsillusion.de
    ServerAlias www.wohlstandsillusion.de
    DocumentRoot /var/www/wohlstandsillusion.de

    <Directory /var/www/wohlstandsillusion.de>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/wohlstandsillusion.de-error.log
    CustomLog ${APACHE_LOG_DIR}/wohlstandsillusion.de-access.log combined
</VirtualHost>
