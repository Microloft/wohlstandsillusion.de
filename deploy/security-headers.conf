# Security-Headers für wohlstandsillusion.de
# ============================================
#
# Diese Direktiven NACH dem certbot-Lauf in die automatisch
# erzeugte Datei einfügen:
#   /etc/apache2/sites-available/wohlstandsillusion.de-le-ssl.conf
#
# Innerhalb des <VirtualHost *:443>-Blocks, vor </VirtualHost> einfügen.
# Anschließend:
#   sudo apache2ctl configtest
#   sudo systemctl reload apache2

# --- Security-Headers ---
Header always set Strict-Transport-Security "max-age=86400"
Header always set X-Content-Type-Options "nosniff"
Header always set X-Frame-Options "DENY"
Header always set Referrer-Policy "strict-origin-when-cross-origin"
Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"
Header always set Content-Security-Policy "default-src 'self'; style-src 'self'; font-src 'self'; img-src 'self'; script-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

# --- Komprimierung ---
<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/html text/css text/xml application/xml application/rss+xml image/svg+xml
</IfModule>

# --- Cache-Header (benötigt mod_expires: sudo a2enmod expires) ---
<IfModule mod_expires.c>
    ExpiresActive On
    ExpiresByType text/html "access plus 1 hour"
    ExpiresByType text/css "access plus 1 year"
    ExpiresByType font/woff2 "access plus 1 year"
    ExpiresByType image/svg+xml "access plus 1 year"
    ExpiresByType image/webp "access plus 1 year"
    ExpiresByType image/avif "access plus 1 year"
    ExpiresByType image/png "access plus 1 year"
    ExpiresByType image/jpeg "access plus 1 year"
    ExpiresByType application/xml "access plus 1 hour"
    ExpiresByType application/rss+xml "access plus 1 hour"
</IfModule>
